<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNG GAMES | Official Home</title>
    <style>
        :root {
            --primary-orange: #ff9900;
            --electric-blue: #22a6b3;
            --dark-bg: #0b0e14;
            --card-bg: rgba(22, 27, 34, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            /* This uses your logo as a faded background element */
            background-image: linear-gradient(rgba(11, 14, 20, 0.8), rgba(11, 14, 20, 0.8)), url('logo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 153, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--primary-orange);
            text-shadow: 0 0 10px rgba(255, 153, 0, 0.5);
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        nav a:hover {
            color: var(--primary-orange);
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Games Section */
        .section-title {
            border-left: 5px solid var(--primary-orange);
            padding-left: 15px;
            margin: 40px 0 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, border 0.3s;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-orange);
        }

        .game-thumb {
            height: 160px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: #555;
        }

        .game-info {
            padding: 20px;
        }

        /* Admin Controls */
        .admin-section {
            margin-top: 80px;
            background: #161b22;
            padding: 40px;
            border-radius: 20px;
            border: 1px dashed #444;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary-orange);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #e68a00;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">DNG GAMES</div>
        <nav id="nav-bar">
            <a href="#">Home</a>
            <a href="#">New Games</a>
            <a href="#">About</a>
        </nav>
    </header>

    <div class="hero">
        <h1>Unleash the Power of Play</h1>
        <p>The ultimate destination for DNG creations.</p>
    </div>

    <div class="container">
        <h2 class="section-title">Latest Games</h2>
        <div class="game-grid" id="game-display">
            <div class="game-card">
                <div class="game-thumb">Game Preview Image</div>
                <div class="game-info">
                    <h3>Sample Game Title</h3>
                    <p>Genre: Adventure</p>
                </div>
            </div>
        </div>

        <div class="admin-section">
            <h2 style="color: var(--primary-orange); margin-top: 0;">Creator Dashboard</h2>
            <div class="admin-grid">
                <div>
                    <h3>Post a Game</h3>
                    <input type="text" id="newGameTitle" placeholder="Enter Game Title...">
                    <input type="text" id="newGameGenre" placeholder="Enter Genre (e.g. Action)...">
                    <button onclick="publishGame()">Publish to Site</button>
                </div>
                <div>
                    <h3>Menu Editor</h3>
                    <input type="text" id="newMenuItem" placeholder="New Navigation Link...">
                    <button onclick="updateMenu()">Add to Navigation</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 DNG GAMES. All Rights Reserved.
    </footer>

    <script>
        function publishGame() {
            const title = document.getElementById('newGameTitle').value;
            const genre = document.getElementById('newGameGenre').value;
            
            if(title && genre) {
                const grid = document.getElementById('game-display');
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-thumb">Ready to Play</div>
                    <div class="game-info">
                        <h3>${title}</h3>
                        <p>Genre: ${genre}</p>
                    </div>
                `;
                grid.prepend(card);
                
                // Clear inputs
                document.getElementById('newGameTitle').value = '';
                document.getElementById('newGameGenre').value = '';
            } else {
                alert("Please fill in both fields!");
            }
        }

        function updateMenu() {
            const item = document.getElementById('newMenuItem').value;
            if(item) {
                const nav = document.getElementById('nav-bar');
                const link = document.createElement('a');
                link.href = "#";
                link.innerText = item;
                nav.appendChild(link);
                document.getElementById('newMenuItem').value = '';
            }
        }
    </script>
</body>
</html>
